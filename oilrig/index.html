<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Spreadsheet Replica Mirror</title>
    <style>
        body {
            background-color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            margin: 0;
            padding: 30px;
        }
        .spreadsheet-container {
            background: white;
            border: 1px solid #c0c0c0;
            border-radius: 4px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            overflow-x: auto;
            display: inline-block;
            min-width: 600px;
        }
        table {
            border-collapse: collapse;
            font-size: 13px;
            color: #333;
        }
        td {
            border: 1px solid #e0e0e0;
            padding: 6px 12px;
            min-width: 100px;
            height: 22px;
            white-space: nowrap;
        }
        .corner-header {
            background-color: #f8f9fa;
            border: 1px solid #c0c0c0;
            width: 40px;
        }
    </style>
</head>
<body>

    <div class="spreadsheet-container">
        <table id="excelGrid">
            </table>
    </div>

    <script>
        const eventSource = new EventSource('http://localhost:3000/events');

        eventSource.onmessage = function(event) {
            const payload = JSON.parse(event.data);
            const gridTable = document.getElementById('excelGrid');
            
            gridTable.innerHTML = "";
            
            if (!payload.rows || payload.rows.length === 0) return;

            // Loop through each row of cells sent from Google
            payload.rows.forEach((row) => {
                const tr = document.createElement('tr');
                
                row.forEach((cell) => {
                    const td = document.createElement('td');
                    
                    td.textContent = cell.value;
                    
                    if (cell.background) td.style.backgroundColor = cell.background;
                    if (cell.color) td.style.color = cell.color;
                    if (cell.isBold) td.style.fontWeight = 'bold';
                    if (cell.isItalic) td.style.fontStyle = 'italic';
                    
                    tr.appendChild(td);
                });
                
                gridTable.appendChild(tr);
            });
        };
    </script>
</body>
</html>
